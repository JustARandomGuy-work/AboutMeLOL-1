<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In - About Me.LOL</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%239b4dff%22 stroke-width=%222.5%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><path d=%22M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71%22></path><path d=%22M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71%22></path></svg>">
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/" aria-label="About-Me.LOL">
          <span class="brand-dot" aria-hidden="true"></span>
          <span class="brand-text">About-Me.LOL</span>
        </a>
        <nav class="topnav">
          <a class="nav-link" href="/pricing">Pricing</a>
        </nav>
        <div class="auth"></div>
      </div>
    </header>

    <main class="wrap auth-page">
      <section class="auth-panel">
        <div class="auth-copy">
          <span class="eyebrow">Welcome back</span>
          <h1>Pick the way you want to jump in.</h1>
          <p>Use email and password, or continue with Google or Discord.</p>
          <ul class="auth-points">
            <li>Fast access to your dashboard</li>
            <li>One account across profile and shop</li>
            <li>Clean, premium experience from the first click</li>
          </ul>
        </div>

        <div class="auth-card">
          <div class="method-list" role="list" aria-label="Sign in methods">
            <button class="method-card active" data-mode="email" type="button">
              <span class="method-title">Email & password</span>
              <span class="method-subtitle">Use your email and a secure password.</span>
            </button>
            <button class="method-card" data-mode="google" type="button">
              <span class="method-title">Continue with Google</span>
              <span class="method-subtitle">Fast sign-in with your Google account.</span>
            </button>
            <button class="method-card" data-mode="discord" type="button">
              <span class="method-title">Continue with Discord</span>
              <span class="method-subtitle">Bring your community identity with you.</span>
            </button>
          </div>

          <div class="error-msg" id="errorMsg"></div>
          <div class="success-msg" id="successMsg"></div>

          <div id="emailFormPanel">
            <form id="loginForm" class="auth-form">
              <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com" />
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" />
              </div>
              <button type="submit" class="btn-submit" id="submitBtn">Log In</button>
            </form>
          </div>

          <div class="form-footer">
            New here? <a href="/signup">Create an account</a>
          </div>
        </div>
      </section>
    </main>

    <script>
      const methodButtons = Array.from(document.querySelectorAll('.method-card'));
      const emailPanel = document.getElementById('emailFormPanel');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const form = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');

      const setMode = (mode) => {
        methodButtons.forEach((button) => {
          button.classList.toggle('active', button.dataset.mode === mode);
        });

        if (mode === 'email') {
          emailPanel.hidden = false;
        } else {
          emailPanel.hidden = true;
          errorMsg.style.display = 'none';
          successMsg.style.display = 'none';
          successMsg.textContent = `${mode === 'google' ? 'Google' : 'Discord'} sign-in is ready for your backend OAuth setup. Redirecting to your dashboard...`;
          successMsg.style.display = 'block';
          localStorage.setItem('authMethod', mode);
          localStorage.setItem('aboutme_logged_in', '1');
          localStorage.setItem('token', 'demo-token');
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 800);
        }
      };

      methodButtons.forEach((button) => {
        button.addEventListener('click', () => setMode(button.dataset.mode));
      });

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.classList.add('loading');
        submitBtn.textContent = 'Signing in...';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
          errorMsg.textContent = 'Please enter both your email and password.';
          errorMsg.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.classList.remove('loading');
          submitBtn.textContent = 'Log In';
          return;
        }

        localStorage.setItem('authMethod', 'email');
        localStorage.setItem('aboutme_logged_in', '1');
        localStorage.setItem('token', 'demo-token');
        localStorage.setItem('username', email.split('@')[0]);
        successMsg.textContent = 'Signed in. Redirecting to your dashboard...';
        successMsg.style.display = 'block';
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 800);
      });
    </script>
  </body>
</html>
