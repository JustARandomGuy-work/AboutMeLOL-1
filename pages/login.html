    <header class="topbar">

        <div class="auth"></div>
      </div>
    </header>

    <main class="wrap">
      <section class="auth-form">
        <h1 style="text-align: center; margin-bottom: 30px; font-size: 24px;">Welcome Back</h1>
        
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com" />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••" />
          </div>

          <button type="submit" class="btn-submit" id="submitBtn">Log In</button>
        </form>

        <div class="form-footer">
          Don't have an account? <a href="/pages/signup.html">Sign Up</a>
        </div>

        <div class="form-footer" style="margin-top: 8px;">
          <a href="/" style="color: rgba(233,236,255,.6);">← Back to Home</a>
        </div>
      </section>
    </main>

    <script src="../js/auth-manager.js"></script>
    <script>
      window.API_BASE_URL = window.API_BASE_URL || (
        window.location.hostname === 'localhost'
          ? 'http://localhost:3000'
          : 'https://aboutmelol-1.onrender.com'
      );

      const form = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.classList.add('loading');
        submitBtn.textContent = 'Logging in...';

        try {
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;

          const response = await fetch(window.API_BASE_URL + '/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || 'Login failed');
          }

          // Save tokens
          localStorage.setItem('token', data.token);
          localStorage.setItem('refreshToken', data.refreshToken);
          localStorage.setItem('userId', data.id);
          localStorage.setItem('username', data.username);

          successMsg.textContent = 'Login successful! Redirecting...';
          successMsg.style.display = 'block';

          setTimeout(() => {
            window.location.href = '/pages/dashboard/index.html';
          }, 1500);
        } catch (error) {
          errorMsg.textContent = error.message;
          errorMsg.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.classList.remove('loading');
          submitBtn.textContent = 'Log In';
        }
      });
    </script>
  </body>
</html>
